    - cron: '0 12 */3 * *'
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "https://eqqdjscfogwwshzdrdnw.supabase.co/rest/v1/" \
            -H "apikey: sb_publishable_7rVfq5jdsbhvXikHvXfNbA_x5ZxRisl" \
            --fail --silent --show-error
          echo "✅ Supabase pinged successfully"
